<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sovereign IDE — Component Sandbox</title>
	<style>
		:root {
			--bg: #f5f5f5;
			--panel: #fff;
			--text: #111;
			--font-base: 'Inter', system-ui, sans-serif;
			--aside-border: 1px solid rgba(0,0,0,0.1);
			--aside-padding: 1.5rem;
		}
		[theme="dark"] {
			--bg: #111;
			--panel: #222;
			--text: #eee;
			--aside-border: 1px solid rgba(255,255,255,0.1);
		}
		[theme="contrast"] {
			--bg: #000;
			--panel: #000;
			--text: #fff;
			--aside-border: 2px solid #fff;
			border: 2px solid #fff;
		}
		body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			font-family: var(--font-base);
			display: grid;
			grid-template-columns: 280px 1fr;
			height: 100vh;
		}
		aside {
			background: var(--panel);
			border-right: var(--aside-border);
			padding: var(--aside-padding);
			display: flex;
			flex-direction: column;
			gap: 1.5rem;
		}
		.controls h4 { margin: 0 0 0.5rem 0; font-size: 0.8rem; text-transform: uppercase; opacity: 0.6; }
		.btn-group { display: flex; flex-direction: column; gap: 0.5rem; }
		button {
			padding: 0.6rem 1rem;
			border: 1px solid rgba(0,0,0,0.1);
			background: var(--bg);
			color: var(--text);
			border-radius: 6px;
			cursor: pointer;
			text-align: left;
			font-weight: 500;
		}
		button:hover { background: rgba(0,0,0,0.05); }
		button.active { border-color: #0066cc; background: rgba(0,102,204,0.1); }

		#playground {
			position: relative;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 2rem;
		}
		.frame {
			width: 100%;
			max-width: 800px;
			height: 80vh;
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 20px 50px rgba(0,0,0,0.1);
			position: relative;
			overflow: hidden;
		}
	</style>
</head>
<body theme="light">
	<aside>
		<div class="controls">
			<h4>Components</h4>
			<div class="btn-group">
				<button id="btn-catalog">Editor Catalog (🔍)</button>
				<button id="btn-item">Editor Item (📄)</button>
			</div>
		</div>
		<div class="controls">
			<h4>Visual Theme</h4>
			<div class="btn-group">
				<button onclick="setTheme('light')">☀️ Light</button>
				<button onclick="setTheme('dark')">🌙 Dark</button>
				<button onclick="setTheme('contrast')">🔳 High Contrast</button>
			</div>
		</div>
		<div class="controls">
			<h4>Global Info</h4>
			<div style="font-size: 0.7rem; opacity: 0.7;">
				<p><b>NaN•Logic:</b> Zero Latency</p>
				<p><b>Context:</b> Recursive Stack</p>
			</div>
		</div>
	</aside>

	<main id="playground"></main>

	<script type="module">
		const playground = document.getElementById('playground')

		window.setTheme = (t) => {
			document.body.setAttribute('theme', t)
		}

		document.getElementById('btn-catalog').onclick = async () => {
			playground.innerHTML = '<div class="frame" id="bench"></div>'
			// In sandbox mode, we directly import and render
			const { render, html } = await import('lit')
			await import('./EditorCatalog.play.js')
		}

		document.getElementById('btn-item').onclick = async () => {
			playground.innerHTML = '<div class="frame" id="bench"></div>'
			await import('./EditorItem.play.js')
		}

		// Load default
		document.getElementById('btn-item').click()
	</script>
</body>
</html>
