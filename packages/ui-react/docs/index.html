<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>NaN•UI React</title>
	<link rel="icon" type="image/svg+xml" href="/packages/ui-react/favicon.svg" />
	<script>
		const SUPPORTED = ['uk', 'en']
		const stored = localStorage.getItem('nan0ui-locale')
		if (stored && SUPPORTED.includes(stored)) {
			location.replace('/packages/ui-react/' + stored + '/index.html')
		} else {
			const nav = (navigator.language || '').slice(0, 2)
			if (SUPPORTED.includes(nav)) {
				location.replace('/packages/ui-react/' + nav + '/index.html')
			} else {
				location.replace('/packages/ui-react/uk/index.html')
			}
		}
	</script>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: system-ui, -apple-system, sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			background: #0a0a0a;
			color: #f0f0f0;
		}
		.chooser { text-align: center; max-width: 500px; padding: 2rem; }
		.brand { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
		.brand .dot { color: #61dafb; }
		.subtitle { color: rgba(255,255,255,0.5); margin-bottom: 3rem; font-size: 1.1rem; }
		.langs { display: flex; gap: 1.5rem; justify-content: center; }
		.lang-card {
			display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
			padding: 2rem 3rem; background: #141414; border: 1px solid rgba(255,255,255,0.1);
			border-radius: 16px; text-decoration: none; color: #f0f0f0;
			transition: all 0.2s; font-size: 1.1rem; font-weight: 600;
		}
		.lang-card:hover { border-color: #61dafb; transform: translateY(-2px); background: #1a1a1a; }
		.flag { font-size: 2.5rem; }
	</style>
</head>
<body>
	<div class="chooser">
		<div class="brand">NaN<span class="dot">•</span>UI React</div>
		<div class="subtitle">Choose your language / Оберіть мову</div>
		<div class="langs">
			<a href="/uk/index.html" class="lang-card" onclick="localStorage.setItem('nan0ui-locale','uk')">
				<span class="flag">🇺🇦</span>
				Українська
			</a>
			<a href="/en/index.html" class="lang-card" onclick="localStorage.setItem('nan0ui-locale','en')">
				<span class="flag">🇬🇧</span>
				English
			</a>
		</div>
	</div>
</body>
</html>
