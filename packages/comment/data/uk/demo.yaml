title: "@nan0web/comment"
subtitle: Інтерактивна Пісочниця Розробника та Презентація
description: >
  Ласкаво просимо до самоописуваного демо компоненту Коментатор. 
  Ця сторінка побудована з data/uk/demo.yaml, щоб продемонструвати силу Model-as-Schema.
  Натисніть кнопку «💬 Увімкнути Коментатор» нижче, щоб почати залишати коментарі на будь-якому елементі цієї презентації!

features:
  - id: zero-hardcode
    icon: 🛡️
    title: Zero-Hardcode Текст (Анти-Галюцинація)
    description: Весь текст динамічно підставляється через I18n рядки. CommentModel не містить жодних статичних українських чи англійських рядків безпосередньо в коді.
    
  - id: zero-logic
    icon: 🧠
    title: Zero-Logic UI (Тупий Рендер)
    description: WebCommentAdapter відповідає лише за DOM-розмітку. Усі переходи станів, валідація та бізнес-логіка виконуються всередині генератора CommentModel.

  - id: responsive-css
    icon: 🎨
    title: Токен-Орієнтований CSS Дизайн
    description: Понад 30 семантичних CSS Custom Properties дозволяють легко інтегрувати оверлей у будь-який проєкт із світлою чи темною темою без перевизначення конкретних пікселів.

  - id: ssr-safe
    icon: 🚀
    title: SSR/SSG Безпека
    description: Об'єкти Window, Dialog та Document захищені, що забезпечує універсальну сумісність із генераторами статичних сайтів та інструментами серверного рендерингу Node.

actions:
  toggle_demo: 💬 Увімкнути Коментатор
  reset_demo: 📋 Коментарі

