<!doctype html>
<html lang="uk" data-bs-theme="light">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ui-lit Playground</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		<!-- E2E Example Web Component -->
		<script src="../e2e/e2e-example.js"></script>
		<!-- Inspector Component -->
		<script src="../e2e/olmui-inspector.js"></script>
		<!-- Data-Driven setup logic -->
		<script type="module" src="../e2e/playground-setup.js"></script>
		<style>
			:root {
				--co: #0d6efd;
				--co-on: #fff;
				--co-success: #198754;
				--co-warn: #ffc107;
				--co-danger: #dc3545;
				--ba: #ffffff;
				--ba-surface: #f8f9fa;
				--ba-code: rgba(0, 0, 0, 0.05);
				--fg: #212529;
				--fg-dim: #6c757d;
				--fg-muted: #adb5bd;
				--border: #dee2e6;
				--ra-sm: 0.25rem;
				--ra-md: 0.375rem;
				--ra-lg: 0.5rem;
				--mono: var(--bs-font-monospace);
				--sans: var(--bs-font-sans-serif);
			}
			[data-bs-theme='dark'] {
				--co: #0d6efd;
				--co-on: #fff;
				--co-success: #198754;
				--co-warn: #ffc107;
				--co-danger: #dc3545;
				--ba: #212529;
				--ba-surface: #2b3035;
				--ba-code: rgba(255, 255, 255, 0.05);
				--fg: #f8f9fa;
				--fg-dim: #adb5bd;
				--fg-muted: #6c757d;
				--border: #495057;
			}
		</style>
	</head>
	<body>
		<div
			class="d-flex flex-column flex-md-row bg-body-tertiary"
			style="min-height: 100vh; padding-bottom: 70px"
		>
			<!-- Sidebar Navigation -->
			<nav
				class="col-md-3 col-lg-2 bg-body shadow-sm sidebar sticky-top d-none d-md-block"
				style="top: 0; height: 100vh; overflow-y: auto"
				id="sidebar-root"
			></nav>

			<!-- Main Content -->
			<div class="col-md-9 col-lg-10">
				<div
					class="bg-body shadow-sm border-bottom py-3 px-3 px-md-4 mb-5 d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3"
				>
					<div>
						<h1 class="fw-bold mb-0 h3" id="page-title">Каталог Блоків</h1>
						<p class="text-muted small mb-0 mt-1" id="page-subtitle"></p>
					</div>
					<button class="btn btn-outline-primary fw-bold px-4 shadow-sm" id="locale-btn">
						🇺🇦 UK → EN
					</button>
				</div>

				<div class="container-fluid px-3 px-md-4 pb-5" id="content-root">
					<!-- Components will be rendered here dynamically -->
				</div>
			</div>
		</div>
	</body>
</html>
