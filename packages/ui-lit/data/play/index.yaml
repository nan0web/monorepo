# Sandbox Component Examples

title: Каталог OLMUI
subtitle: '@nan0web/ui-lit'
sections:
  - title: 'Phase 1 — Core'
    items:
      - id: 'block-nav'
        title: 'Nav'
        desc: 'Верхня навігація (Navbar).'
        schema:
          - name: ui-nav-height
            label: Висота навігації
            type: size
            default: 60px
          - name: ui-nav-bg
            label: Колір фону
            type: color
            default: '#ffffff'
          - name: ui-nav-fg
            label: Колір тексту
            type: color
            default: '#212529'
          - name: ui-nav-link-hover
            label: Активний колір (hover)
            type: color
            default: '#0d6efd'
          - name: ui-nav-border
            label: Колір розділювача
            type: color
            default: '#e9ecef'
          - name: ui-nav-blur
            label: Ефект скла (blur)
            type: string
            default: saturate(180%) blur(20px)
        examples:
          - label: 'Проста навігація'
            previewHtml: |
              <ui-nav id="e2e-nav" ></ui-nav>
            codeHtml: |
              <ui-nav id="my-nav"></ui-nav>
              <script>
                nav.brand = { title: 'Bank Shell', url: '#' }
                nav.items = [
                  { label: 'Головна', url: '#' },
                  { label: 'Про нас', url: '#' },
                  { label: 'Послуги', children: [
                    { label: 'Депозити' },
                    { label: 'Кредити' }
                  ]}
                ]
              </script>
            codeYaml: |
              $content:
              - Nav
              $nav:
                brand:
                  title: Bank Shell
                  url: "#"
              nav:
                - label: Головна
                  url: "#"
                - label: Про нас
                  url: "#"
                - label: Послуги
                  children:
                    - label: Депозити
                    - label: Кредити
          - label: 'Мінімальна навігація'
            previewHtml: |
              <ui-nav id="e2e-nav-min"></ui-nav>
              <script>
                document.getElementById('e2e-nav-min').brand = { title: 'My App' }
                document.getElementById('e2e-nav-min').items = [
                  { label: 'Головна', url: '#' },
                ]
              </script>
            codeHtml: |
              <ui-nav id="nav"></ui-nav>
              <script>
                nav.brand = { title: 'My App' }
                nav.items = [{ label: 'Головна', url: '#' }]
              </script>
            codeYaml: |
              $content:
              - Nav
              $nav:
                brand:
                  title: My App
              nav:
                - label: Головна
                  url: "#"
      - id: 'block-sidebar'
        title: 'Sidebar'
        desc: 'Бокове меню для навігації.'
        schema:
          - name: ui-sidebar-width
            label: Ширина бокового меню
            type: size
            default: 260px
          - name: ui-sidebar-bg
            label: Колір фону
            type: color
            default: #f8f9fa
          - name: ui-sidebar-fg
            label: Колір тексту
            type: color
            default: #212529
          - name: ui-sidebar-border
            label: Колір розділювача
            type: color
            default: #e9ecef
          - name: ui-sidebar-active
            label: Колір активного пункту
            type: color
            default: #0d6efd
          - name: ui-sidebar-group-fg
            label: Колір заголовків груп
            type: color
            default: #6c757d
        examples:
          - label: 'Ієрархічне меню'
            previewHtml: |
              <div style="max-width: 300px; height: 300px" >
              						<ui-sidebar id="e2e-sidebar"></ui-sidebar>
              					</div>
            codeHtml: |
              <ui-sidebar id="sb"></ui-sidebar>
              <script>
                sb.title = 'Налаштування'
                sb.items = [
                  { label: 'Профіль', url: '#profile', active: true },
                  { label: 'Безпека', url: '#security' },
                  { label: 'Сповіщення', children: [{ label: 'Email' }] }
                ]
              </script>
            codeYaml: |
              $content:
              - Sidebar
              $sidebar:
                title: Налаштування
              sidebar:
                - label: Профіль
                  url: "#profile"
                  active: true
                - label: Безпека
                  url: "#security"
                - label: Сповіщення
                  children:
                    - label: Email
          - label: 'Просте меню'
            previewHtml: |
              <div style="max-width: 300px; height: 200px">
                <ui-sidebar id="e2e-sidebar-simple"></ui-sidebar>
                <script>
                  document.getElementById('e2e-sidebar-simple').title = 'Меню'
                  document.getElementById('e2e-sidebar-simple').items = [
                    { label: 'Головна', active: true },
                    { label: 'Контакти' },
                  ]
                </script>
              </div>
            codeHtml: |
              <ui-sidebar id="sb"></ui-sidebar>
              <script>
                sb.title = 'Меню'
                sb.items = [
                  { label: 'Головна', active: true },
                  { label: 'Контакти' },
                ]
              </script>
            codeYaml: |
              $content:
              - Sidebar
              $sidebar:
                title: Меню
              sidebar:
                - label: Головна
                  active: true
                - label: Контакти
      - id: 'block-callout'
        title: 'Alert / Callout'
        desc: 'Блоки уваги.'
        schema:
          - name: ui-alert-radius
            label: Заокруглення кутів
            type: size
            default: 8px
          - name: ui-alert-border-width
            label: Ширина лівої лінії
            type: size
            default: 4px
          - name: ui-alert-bg
            label: Колір фону
            type: color
            default: #f0f9ff
          - name: ui-alert-fg
            label: Колір тексту
            type: color
            default: #212529
          - name: ui-alert-accent
            label: Акцентний колір
            type: color
            default: #0d6efd
          - name: ui-alert-icon-color
            label: Колір іконки
            type: color
            default: #0d6efd
        examples:
          - label: 'Info'
            previewHtml: |
              <ui-alert
              	id="e2e-alert-info"
              	variant="info"
              	title="Info"
              	content="Informational message."
              ></ui-alert>
            codeHtml: |
              <ui-alert variant="info" title="Info" content="Informational message."></ui-alert>
            codeYaml: |
              $content:
              - Content
              content:
              - Alert.info:
                  title: Info
                  content: Informational message.
          - label: 'Success'
            previewHtml: |
              <ui-alert
              	id="e2e-alert-success"
              	variant="success"
              	title="Success"
              	content="Operation completed successfully."
              ></ui-alert>
            codeHtml: |
              <ui-alert variant="success" title="Success" content="Operation completed successfully."></ui-alert>
            codeYaml: |
              $content:
              - Content
              content:
              - Alert.success:
                  title: Success
                  content: Operation completed successfully.
          - label: 'Warning'
            previewHtml: |
              <ui-alert
              	id="e2e-alert-warning"
              	variant="warning"
              	title="Warning"
              	content="Please check your input."
              ></ui-alert>
            codeHtml: |
              <ui-alert variant="warning" title="Warning" content="Please check your input."></ui-alert>
            codeYaml: |
              $content:
              - Content
              content:
              - Alert.warn:
                  title: Warning
                  content: Please check your input.
          - label: 'Error'
            previewHtml: |
              <ui-alert
              	id="e2e-alert-error"
              	variant="error"
              	title="Error"
              	content="Something went wrong."
              ></ui-alert>
            codeHtml: |
              <ui-alert variant="error" title="Error" content="Something went wrong."></ui-alert>
            codeYaml: |
              $content:
              - Content
              content:
              - Alert.err:
                  title: Error
                  content: Something went wrong.
          - label: 'Tip'
            previewHtml: |
              <ui-alert
              	id="e2e-alert-tip"
              	variant="tip"
              	title="Tip"
              	content="Use keyboard shortcuts for faster navigation."
              ></ui-alert>
            codeHtml: |
              <ui-alert variant="tip" title="Tip" content="Use keyboard shortcuts for faster navigation."></ui-alert>
            codeYaml: |
              $content:
              - Content
              content:
              - Alert.tip:
                  title: Tip
                  content: Use keyboard shortcuts for faster navigation.
      - id: 'block-markdown'
        title: 'Markdown'
        desc: 'Рендер HTML контенту.'
        schema:
          - name: ui-md-fg
            label: Колір тексту
            type: color
            default: #212529
          - name: ui-md-link
            label: Колір посилань
            type: color
            default: #0d6efd
          - name: ui-md-border
            label: Колір розділювачів
            type: color
            default: #e9ecef
          - name: ui-md-code-bg
            label: Фон коду
            type: color
            default: #f8f9fa
          - name: ui-md-code-fg
            label: Колір коду
            type: color
            default: #e83e8c
          - name: ui-md-font
            label: Основний шрифт
            type: string
            default: "system-ui, sans-serif"
          - name: ui-md-heading-font
            label: Шрифт заголовків
            type: string
            default: inherit
        examples:
          - label: 'Заголовки та списки'
            previewHtml: |
              <ui-markdown id="e2e-markdown" ></ui-markdown>
            codeHtml: |
              <ui-markdown id="md"></ui-markdown>
              <script>
                md.content = `
                  <h1>Title</h1>
                  <h2>Subtitle</h2>
                  <p>Here is a list of</p>
                  <ul>
                    <li>apple</li>
                    <li>banana</li>
                  </ul>
                `
              </script>
            codeYaml: |
              $content:
              - Content
              content:
              - Markdown: |
                  # Title
                  ## Subtitle
                  Here is a list of
                  - apple
                  - banana
          - label: 'Код і цитата'
            previewHtml: |
              <ui-markdown id="e2e-markdown-code"></ui-markdown>
              <script>
                document.getElementById('e2e-markdown-code').content = `
                  <p><strong>Bold text</strong> and <a href="#">link</a></p>
                  <pre><code>const hello = 'world'</code></pre>
                  <blockquote><p>This is a quote</p></blockquote>
                `
              </script>
            codeHtml: |
              <ui-markdown id="md"></ui-markdown>
              <script>
                md.content = `
                  <p><strong>Bold</strong> and <a href="#">link</a></p>
                  <pre><code>const hello = 'world'</code></pre>
                  <blockquote><p>This is a quote</p></blockquote>
                `
              </script>
            codeYaml: |
              $content:
              - Content
              content:
              - Markdown: |
                  **Bold text** and [link](#)

                  ```js
                  const hello = 'world'
                  ```

                  > This is a quote
      - id: 'block-themetoggle'
        title: 'ThemeToggle'
        desc: 'Перемикач теми.'
        schema:
          - name: ui-toggle-size
            label: Розмір кнопки
            type: size
            default: 40px
          - name: ui-toggle-color
            label: Колір іконки
            type: color
            default: #6c757d
          - name: ui-toggle-hover
            label: Колір при наведенні
            type: color
            default: #0d6efd
        examples:
          - label: 'Перемикач light/dark'
            previewHtml: |
              <div
              	class="d-flex align-items-center gap-3 p-3 border rounded shadow-sm"
              >
              	<span class="text-muted small">Тема: <strong id="e2e-theme-value"></strong></span>
              	<ui-theme-toggle id="e2e-theme-toggle"></ui-theme-toggle>
              </div>
            codeHtml: |
              <ui-theme-toggle></ui-theme-toggle>
            codeYaml: |
              $content:
              - ThemeToggle
          - label: 'У навігації'
            previewHtml: |
              <div class="d-flex align-items-center gap-3 p-3 border rounded shadow-sm">
                <span class="text-muted small">Для використання в Nav/Sidebar</span>
                <ui-theme-toggle></ui-theme-toggle>
              </div>
            codeHtml: |
              <ui-nav id="nav"></ui-nav>
              <script>
                // ThemeToggle вбудовується автоматично
                nav.brand = { title: 'App' }
              </script>
            codeYaml: |
              $content:
              - Nav
              - ThemeToggle
              $nav:
                brand:
                  title: App
      - id: 'block-langselect'
        title: 'LangSelect'
        desc: 'Перемикач мови.'
        schema:
          - name: ui-lang-color
            label: Колір тексту
            type: color
            default: #212529
          - name: ui-lang-hover
            label: Фон при наведенні
            type: color
            default: #f0f0f0
          - name: ui-lang-active-bg
            label: Фон вибраного
            type: color
            default: #e9ecef
          - name: ui-lang-font
            label: Шрифт
            type: string
            default: "system-ui, sans-serif"
        examples:
          - label: 'Вибір мови'
            previewHtml: |
              <div
              	class="d-flex align-items-center gap-3 p-3 border rounded shadow-sm"
              >
              	<span class="text-muted small">Мова: <strong id="e2e-locale-value"></strong></span>
              	<ui-lang-select id="e2e-lang-select"></ui-lang-select>
              </div>
            codeHtml: |
              <ui-lang-select></ui-lang-select>
            codeYaml: |
              $content:
              - LangSelect
          - label: 'У навігації'
            previewHtml: |
              <div class="d-flex align-items-center gap-3 p-3 border rounded shadow-sm">
                <span class="text-muted small">Для використання в Nav</span>
                <ui-lang-select></ui-lang-select>
              </div>
            codeHtml: |
              <ui-nav id="nav"></ui-nav>
              <script>
                // LangSelect вбудовується автоматично
                nav.brand = { title: 'App' }
              </script>
            codeYaml: |
              $content:
              - Nav
              - LangSelect
              $nav:
                brand:
                  title: App
      - id: 'block-badge'
        title: 'Badge'
        desc: 'Позначки статусів.'
        schema:
          - name: ui-badge-bg
            label: Колір фону
            type: color
            default: #0d6efd
          - name: ui-badge-fg
            label: Колір тексту
            type: color
            default: #ffffff
          - name: ui-badge-radius
            label: Заокруглення
            type: size
            default: 999px
          - name: ui-badge-border
            label: Бордер
            type: string
            default: none
          - name: ui-badge-font
            label: Розмір шрифту
            type: size
            default: 0.75rem
        examples:
          - label: 'Всі варіанти'
            previewHtml: |
              <div class="d-flex gap-2 flex-wrap" >
              	<ui-badge>neutral</ui-badge>
              	<ui-badge variant="unread">unread</ui-badge>
              	<ui-badge variant="complete">complete</ui-badge>
              	<ui-badge variant="dangerous">dangerous</ui-badge>
              	<ui-badge variant="not-found">not-found</ui-badge>
              </div>
            codeHtml: |
              <ui-badge>neutral</ui-badge>
              <ui-badge variant="unread">unread</ui-badge>
              <ui-badge variant="complete">complete</ui-badge>
              <ui-badge variant="dangerous">dangerous</ui-badge>
              <ui-badge variant="not-found">not-found</ui-badge>
            codeYaml: |
              $content:
              - Content
              content:
              - badge: neutral
              - badge.unread: unread
              - badge.complete: complete
              - badge.dangerous: dangerous
              - badge.not-found: not-found
          - label: 'У контексті'
            previewHtml: |
              <div class="d-flex gap-2 flex-wrap align-items-center">
                <span>Статус замовлення:</span>
                <ui-badge variant="complete">оплачено</ui-badge>
              </div>
            codeHtml: |
              <span>Статус замовлення:</span>
              <ui-badge variant="complete">оплачено</ui-badge>
            codeYaml: |
              $content:
              - Content
              content:
              - "Статус замовлення:"
              - badge.complete: оплачено
      - id: 'block-code'
        title: 'CodeBlock'
        desc: 'Відображення коду.'
        schema:
          - name: ui-code-bg
            label: Фон блоку
            type: color
            default: #1e1e2e
          - name: ui-code-fg
            label: Колір коду
            type: color
            default: #cdd6f4
          - name: ui-code-radius
            label: Заокруглення
            type: size
            default: 12px
          - name: ui-code-border
            label: Бордер
            type: string
            default: none
          - name: ui-code-font
            label: Шрифт
            type: string
            default: "'SF Mono', monospace"
          - name: ui-code-title-fg
            label: Колір заголовка
            type: color
            default: #a6adc8
        examples:
          - label: 'JavaScript'
            previewHtml: |
              <ui-code-block
              	id="e2e-code-block"
              	title="example.js"
              	lang="javascript"
              ></ui-code-block>
            codeHtml: |
              <ui-code-block id="cb" title="example.js" lang="javascript"></ui-code-block>
              <script>
                cb.code = "import { UIAlert } from '@nan0web/ui-lit/core'\n\nconst alert = document.createElement('ui-alert')\nalert.variant = 'success'\nalert.title = 'Done!'"
              </script>
            codeYaml: |
              $content:
              - Content
              content:
              - CodeBlock:
                  title: example.js
                  lang: javascript
                  code: |
                    import { UIAlert } from '@nan0web/ui-lit/core'

                    const alert = document.createElement('ui-alert')
                    alert.variant = 'success'
                    alert.title = 'Done!'
          - label: 'YAML'
            previewHtml: |
              <ui-code-block
              	id="e2e-code-block-yaml"
              	title="config.yaml"
              	lang="yaml"
              ></ui-code-block>
              <script>
                document.getElementById('e2e-code-block-yaml').code = "title: My App\nversion: 1.0.0\nmodules:\n  - auth\n  - test"
              </script>
            codeHtml: |
              <ui-code-block id="cb" title="config.yaml" lang="yaml"></ui-code-block>
              <script>
                cb.code = "title: My App\nversion: 1.0.0"
              </script>
            codeYaml: |
              $content:
              - Content
              content:
              - CodeBlock:
                  title: config.yaml
                  lang: yaml
                  code: |
                    title: My App
                    version: 1.0.0
                    modules:
                      - auth
                      - test
      - id: 'block-table'
        title: 'Table'
        desc: 'Таблиці даних.'
        schema:
          - name: ui-table-fg
            label: Колір тексту
            type: color
            default: #212529
          - name: ui-table-fg-muted
            label: Приглушений колір
            type: color
            default: #6c757d
          - name: ui-table-border
            label: Колір ліній
            type: color
            default: #dee2e6
          - name: ui-table-hover-bg
            label: Фон при наведенні
            type: color
            default: "rgba(0,0,0,0.02)"
          - name: ui-table-header-color
            label: Колір заголовків
            type: color
            default: #6c757d
          - name: ui-table-font
            label: Шрифт
            type: string
            default: "system-ui, sans-serif"
        examples:
          - label: 'Список компонентів'
            previewHtml: |
              <ui-table id="e2e-table" ></ui-table>
            codeHtml: |
              <ui-table id="tb"></ui-table>
              <script>
                tb.data = [
                  { component: 'Alert', status: '✅', variants: 'info, success, warning, error' },
                  { component: 'Badge', status: '✅', variants: 'neutral, info, success, warning, error' },
                ]
              </script>
            codeYaml: |
              $content:
              - Content
              content:
              - Table:
                  data:
                    - component: Alert
                      status: "✅"
                      variants: "info, success, warning, error"
                    - component: Badge
                      status: "✅"
                      variants: "neutral, unread, complete, dangerous, not-found"
          - label: 'Прості дані'
            previewHtml: |
              <ui-table id="e2e-table-simple"></ui-table>
              <script>
                document.getElementById('e2e-table-simple').data = [
                  { name: 'Київ', population: '2.9M' },
                  { name: 'Харків', population: '1.4M' },
                  { name: 'Одеса', population: '1.0M' },
                ]
              </script>
            codeHtml: |
              <ui-table id="tb"></ui-table>
              <script>
                tb.data = [
                  { name: 'Київ', population: '2.9M' },
                  { name: 'Харків', population: '1.4M' },
                ]
              </script>
            codeYaml: |
              $content:
              - Content
              content:
              - Table:
                  data:
                    - name: Київ
                      population: "2.9M"
                    - name: Харків
                      population: "1.4M"
                    - name: Одеса
                      population: "1.0M"
  - title: 'Phase 2 — Forms'
    items:
      - id: 'block-input'
        title: 'Input'
        desc: 'Текстове поле з label, placeholder, validation.'
        schema:
          - name: ui-input-bg
            label: Фон поля
            type: color
            default: #ffffff
          - name: ui-input-fg
            label: Колір тексту
            type: color
            default: #212529
          - name: ui-input-border
            label: Колір рамки
            type: color
            default: #dee2e6
          - name: ui-input-focus
            label: Колір фокусу
            type: color
            default: #0d6efd
          - name: ui-input-error
            label: Колір помилки
            type: color
            default: #dc3545
          - name: ui-input-success
            label: Колір успіху
            type: color
            default: #198754
          - name: ui-input-radius
            label: Заокруглення
            type: size
            default: 8px
          - name: ui-input-label-color
            label: Колір мітки
            type: color
            default: #495057
          - name: ui-input-placeholder
            label: Колір placeholder
            type: color
            default: #adb5bd
          - name: ui-input-font
            label: Шрифт
            type: string
            default: "system-ui, sans-serif"
        examples:
          - label: 'Звичайне поле'
            previewHtml: |
              <div style="max-width: 400px">
                <ui-input
              		id="e2e-input"
              		label="Ім'я"
              		placeholder="Введіть ім'я"
              		hint="Обов'язкове поле"
              		required
              	></ui-input>
              </div>
            codeHtml: |
              <ui-input
                label="Ім'я"
                placeholder="Введіть ім'я"
                hint="Обов'язкове поле"
                required
              ></ui-input>
            codeYaml: |
              $content:
              - Content
              content:
              - Input:
                  label: "Ім'я"
