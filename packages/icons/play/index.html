<!doctype html>
<html lang="uk" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>@nan0web/icons — Explorer</title>
		<script>
			// Enforce trailing slash for correct module resolution
			if (window.location.pathname.endsWith('/play')) {
				window.location.pathname += '/'
			}
		</script>
		<style>
			:root {
				--bg: #0b0f19;
				--sidebar-bg: #121826;
				--surface: #1a2235;
				--border: #2a344a;
				--text: #e2e8f0;
				--text-muted: #94a3b8;
				--accent: #3b82f6;
				--accent-hover: #60a5fa;
				--success: #10b981;
				--danger: #ef4444;

				--radius: 12px;
				--font: 'Inter', system-ui, -apple-system, sans-serif;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: var(--font);
				background: var(--bg);
				color: var(--text);
				height: 100vh;
				display: flex;
				overflow: hidden;
			}

			/* Sidebar */
			aside {
				width: 280px;
				background: var(--sidebar-bg);
				border-right: 1px solid var(--border);
				display: flex;
				flex-direction: column;
				flex-shrink: 0;
			}

			.header {
				padding: 1.5rem;
				border-bottom: 1px solid var(--border);
			}

			.header h1 {
				font-size: 1.25rem;
				font-weight: 700;
				color: #fff;
				margin-bottom: 0.25rem;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}

			.header p {
				font-size: 0.8rem;
				color: var(--text-muted);
			}

			.sidebar-content {
				padding: 1.5rem;
				overflow-y: auto;
				flex: 1;
			}

			/* Filters */
			h3 {
				font-size: 0.85rem;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				color: var(--text-muted);
				margin-bottom: 1rem;
			}

			.filter-list {
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			.filter-item {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				font-size: 0.95rem;
				cursor: pointer;
			}

			.filter-item input[type='checkbox'] {
				width: 16px;
				height: 16px;
				border-radius: 4px;
				accent-color: var(--accent);
				cursor: pointer;
			}

			.count-badge {
				margin-left: auto;
				background: var(--surface);
				padding: 0.15rem 0.4rem;
				border-radius: 20px;
				font-size: 0.75rem;
				color: var(--text-muted);
				font-variant-numeric: tabular-nums;
			}

			/* Main Content */
			main {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
			}

			.topbar {
				padding: 1.5rem 2rem;
				border-bottom: 1px solid var(--border);
				display: flex;
				gap: 1rem;
				align-items: center;
				background: var(--bg);
				z-index: 10;
			}

			.search-container {
				flex: 1;
				position: relative;
			}

			.search-input {
				width: 100%;
				background: var(--surface);
				border: 1px solid var(--border);
				color: var(--text);
				padding: 0.8rem 1rem 0.8rem 2.5rem;
				border-radius: var(--radius);
				font-size: 1rem;
				outline: none;
				transition: all 0.2s;
			}

			.search-input:focus {
				border-color: var(--accent);
				box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
			}

			.search-icon {
				position: absolute;
				left: 1rem;
				top: 50%;
				transform: translateY(-50%);
				fill: var(--text-muted);
				width: 16px;
				height: 16px;
			}

			.stats {
				font-size: 0.9rem;
				color: var(--text-muted);
			}

			/* Grid */
			.grid-container {
				flex: 1;
				padding: 2rem;
				overflow-y: auto;
				position: relative;
			}

			.grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
				gap: 1rem;
				padding-bottom: 4rem; /* space for observer */
			}

			.icon-card {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 0.75rem;
				padding: 1.25rem 0.5rem;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				cursor: pointer;
				transition: all 0.15s ease;
				min-height: 110px;
			}

			.icon-card:hover {
				border-color: var(--accent);
				background: #1e293b;
				transform: translateY(-2px);
			}

			.icon-card svg {
				fill: var(--text);
				width: 28px;
				height: 28px;
				transition: fill 0.15s;
			}

			.icon-card:hover svg {
				fill: var(--accent);
			}

			.icon-card .name {
				font-size: 0.75rem;
				color: var(--text-muted);
				text-align: center;
				word-break: break-word;
				line-height: 1.3;
			}

			.icon-card .set-label {
				position: absolute;
				top: 0.25rem;
				right: 0.25rem;
				font-size: 0.55rem;
				background: var(--border);
				padding: 0.1rem 0.3rem;
				border-radius: 4px;
				color: #cbd5e1;
				opacity: 0;
				transition: opacity 0.2s;
			}

			.icon-card:hover .set-label {
				opacity: 1;
			}

			/* Loading Spinner */
			.loading {
				text-align: center;
				padding: 2rem;
				color: var(--text-muted);
			}

			.observer-target {
				height: 20px;
				width: 100%;
			}

			/* Modal Sidebar (Details) */
			.modal-overlay {
				position: fixed;
				top: 0;
				right: 0;
				bottom: 0;
				left: 0;
				background: rgba(0, 0, 0, 0.5);
				backdrop-filter: blur(4px);
				z-index: 40;
				opacity: 0;
				pointer-events: none;
				transition: opacity 0.3s;
			}
			.modal-overlay.active {
				opacity: 1;
				pointer-events: auto;
			}

			.details-panel {
				position: fixed;
				top: 0;
				right: 0;
				bottom: 0;
				width: 400px;
				background: var(--sidebar-bg);
				border-left: 1px solid var(--border);
				z-index: 50;
				transform: translateX(100%);
				transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
				display: flex;
				flex-direction: column;
			}
			.details-panel.active {
				transform: translateX(0);
			}

			.dp-header {
				padding: 1.5rem;
				border-bottom: 1px solid var(--border);
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.dp-header .close-btn {
				background: none;
				border: none;
				color: var(--text-muted);
				cursor: pointer;
				padding: 0.5rem;
			}
			.dp-header .close-btn:hover {
				color: var(--text);
			}

			.dp-content {
				padding: 1.5rem;
				flex: 1;
				overflow-y: auto;
			}

			.dp-icon-preview {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 160px;
				background: var(--surface);
				border-radius: var(--radius);
				border: 1px solid var(--border);
				margin-bottom: 1.5rem;
			}
			.dp-icon-preview svg {
				width: 64px;
				height: 64px;
				fill: var(--text);
			}

			.snippet {
				margin-bottom: 1.5rem;
			}
			.snippet-label {
				font-size: 0.8rem;
				color: var(--text-muted);
				margin-bottom: 0.5rem;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.snippet-label button {
				background: none;
				border: none;
				color: var(--accent);
				font-size: 0.75rem;
				cursor: pointer;
			}
			.snippet-code {
				background: #0f172a;
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 1rem;
				font-family: monospace;
				font-size: 0.85rem;
				color: #38bdf8;
				overflow-x: auto;
				white-space: pre-wrap;
				word-break: break-all;
			}

			.toast {
				position: fixed;
				bottom: 2rem;
				left: 50%;
				transform: translateX(-50%) translateY(100px);
				background: var(--success);
				color: #fff;
				padding: 0.75rem 1.5rem;
				border-radius: 30px;
				font-weight: 600;
				font-size: 0.9rem;
				opacity: 0;
				transition: all 0.3s;
				z-index: 100;
				box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
			}
			.toast.show {
				transform: translateX(-50%) translateY(0);
				opacity: 1;
			}
			/* Sandbox Navigation */
		.sandbox-nav {
			margin-top: 2rem;
			padding-top: 1.5rem;
			border-top: 1px solid var(--border);
		}

		.sandbox-link {
			display: grid;
			grid-template-columns: 20px 1fr;
			grid-template-rows: auto auto;
			gap: 0 0.6rem;
			align-items: center;
			padding: 0.75rem 0.8rem;
			margin-bottom: 0.5rem;
			border-radius: 8px;
			background: var(--surface);
			border: 1px solid var(--border);
			text-decoration: none;
			color: var(--text);
			transition: all 0.2s;
			cursor: pointer;
		}

		.sandbox-link:hover {
			border-color: var(--accent);
			background: #1e293b;
		}

		.sandbox-link svg {
			grid-row: 1 / 3;
			color: var(--accent);
		}

		.sandbox-link span {
			font-size: 0.9rem;
			font-weight: 600;
		}

		.sandbox-link small {
			font-size: 0.75rem;
			color: var(--text-muted);
		}

		.sandbox-link code {
			font-size: 0.7rem;
			background: rgba(59, 130, 246, 0.15);
			padding: 0.1rem 0.3rem;
			border-radius: 4px;
			color: var(--accent);
		}

		.sandbox-cli {
			opacity: 0.7;
			cursor: default;
		}

		.sandbox-cli:hover {
			opacity: 1;
		}
	</style>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	</head>
	<body>
		<!-- Sidebar -->
		<aside>
			<div class="header">
				<h1>
					<svg
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						style="color: var(--accent)"
					>
						<polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
						<polyline points="2 17 12 22 22 17"></polyline>
						<polyline points="2 12 12 17 22 12"></polyline>
					</svg>
					@nan0web/icons
				</h1>
				<p>Universal Icon Explorer</p>
			</div>
			<div class="sidebar-content">
				<h3>Filters by Set</h3>
				<div class="filter-list" id="filters">
					<!-- Checkboxes injected by JS -->
				</div>

				<div class="sandbox-nav">
					<h3>Sandboxes</h3>
					<a href="./ui-lit/index.html" class="sandbox-link" id="link-lit">
						<svg
							width="16"
							height="16"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<circle cx="12" cy="12" r="5" />
							<path
								d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
							/>
						</svg>
						<span>Lit Sandbox</span>
						<small>Dark theme grid</small>
					</a>
					<a href="./ui-react/index.html" class="sandbox-link" id="link-react">
						<svg
							width="16"
							height="16"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<circle cx="12" cy="12" r="10" />
							<path
								d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
							/>
						</svg>
						<span>React Sandbox</span>
						<small>Light theme + search</small>
					</a>
					<div class="sandbox-link sandbox-cli" id="link-cli">
						<svg
							width="16"
							height="16"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<polyline points="4 17 10 11 4 5" />
							<line x1="12" y1="19" x2="20" y2="19" />
						</svg>
						<span>CLI Sandbox</span>
						<small><code>node play/ui-cli</code></small>
					</div>
				</div>
			</div>
		</aside>

		<!-- Main Area -->
		<main>
			<div class="topbar">
				<div class="search-container">
					<svg class="search-icon" viewBox="0 0 24 24">
						<path
							d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							fill="none"
						/>
					</svg>
					<input
						type="text"
						id="search"
						class="search-input"
						placeholder="Search by name, set, or tags (e.g. phone, user, bs)"
					/>
				</div>
				<div class="stats" id="stats">Loading...</div>
			</div>

			<div class="grid-container" id="scroll-container">
				<div class="grid" id="grid"></div>
				<div id="observer-target" class="observer-target"></div>
			</div>
		</main>

		<!-- Modals & Toasts -->
		<div class="modal-overlay" id="overlay"></div>
		<div class="details-panel" id="panel">
			<div class="dp-header">
				<h2 id="dp-title">Icon Name</h2>
				<button class="close-btn" id="close-btn">
					<svg
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<line x1="18" y1="6" x2="6" y2="18"></line>
						<line x1="6" y1="6" x2="18" y2="18"></line>
					</svg>
				</button>
			</div>
			<div class="dp-content">
				<div class="dp-icon-preview" id="dp-preview"></div>

				<div class="snippet">
					<div class="snippet-label">
						<span>Lit / HTML</span> <button onclick="copySnippet('lit')">Copy</button>
					</div>
					<div class="snippet-code" id="code-lit"></div>
				</div>

				<div class="snippet">
					<div class="snippet-label">
						<span>React</span> <button onclick="copySnippet('react')">Copy</button>
					</div>
					<div class="snippet-code" id="code-react"></div>
				</div>

				<div class="snippet">
					<div class="snippet-label">
						<span>CLI / Vanilla</span> <button onclick="copySnippet('cli')">Copy</button>
					</div>
					<div class="snippet-code" id="code-cli"></div>
				</div>
			</div>
		</div>

		<div class="toast" id="toast">Copied to clipboard!</div>

		<script type="module" src="./app.js"></script>
	</body>
</html>
