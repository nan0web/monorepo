sections:
  - title: "🧭 Фаза 1: Філософія та Абстракція (The Seed)"
    content:
      - "**Місія та Філософія:**"
      - "Головна мета `@nan0web/editor` — повністю розмежувати логіку редагування, зберігання, стану та історії (стеку модальностей) від візуального інтерфейсу. Візуальні компоненти лише \"підписуються\" на зміни."
      - "**Абстракція (Базовий Додаток):**"
      - "- **ЗАБОРОНЕНО** переносити логіку \"збереження\" або парсингу Markdown/YAML безпосередньо у React/Lit компоненти."
      - "- **ОБОВ'ЯЗКОВО** всі зміни проходять через `EditorModel`."
      - "**Термінологія (Глосарій):**"
      - "- **Model (`EditorModel`)** — джерело істини документа, керує завантаженням і записом через `@nan0web/db`."
      - "- **Modal Stack** — рекурсивний стек занурення в документи, забезпечує Breadcrumbs та \"Вкладені редагування\"."
      - "- **View Mode** — стан візуалу (напр., `preview` | `code`), перемикається через логіку ядра (`switchMode`), щоб гарантувати синхронізацію між кнопками та відображенням."
      - "---"
    tasks: []
  - title: "📐 Фаза 2: Доменне Моделювання (Data-Driven Models)"
    content:
      - "1. **Створення Model.js (`EditorModel` та `ModalStack`):**"
      - "- Сутності існують в `src/core/`."
      - "- Вони агностичні: працюють будь-де, де є JS. Вони не знають про DOM чи термінал."
      - "2. **Data Sources (Джерела Даних як Основа):**"
      - "- Editor працює через єдиний абстрактний інтерфейс `@nan0web/db` (через ін'єкцію залежностей `peerDependencies`)."
      - "- `db.saveDocument(uri)` та `db.loadDocument(uri)` гарантують, що редактор завжди читає свіжі дані, а всі `Mock` зведені до \"об'єкту з інтерфейсом DB\"."
      - "---"
    tasks: []
  - title: "🛠 Фаза 3: Верифікація Логіки (CLI-First)"
    content:
      - "Бізнес-логіка повинна на 100% працювати без веб-інтерфейсу:"
      - "- Основні тести проходять через вбудований `node:test` (див. `src/core/Editor.test.js`)."
      - "- Ми перевіряємо чи оновлюється контент, чи правильно змінюються режими (`loadDocument`, `updateContent`, `switchMode`)."
      - "- Робота зі стеком (ModalStack depth) перевіряється математично, а не через натискання віртуальних кнопок."
      - "---"
    tasks: []
  - title: "🪐 Фаза 4: Sovereign Workbench (The Master IDE)"
    content:
      - "Проєкт має власну пісочницю (Sandbox) для швидкого тестування логіки:"
      - "1. **Інтеграція Документації:**"
      - "- Чіткий `README.md.js` з прикладами."
      - "- Зібраний `docs/site` з SSG (`docs:build`), який відображає інтегровану документацію пакета."
      - "2. **Тестування Data-Driven UI:**"
      - "- Компонентам `ui-react/Editor` прокидається екземпляр `EditorModel`, і вони малюють себе суворо на основі стану логічного ядра."
      - "---"
    tasks: []
  - title: "🎨 Фаза 5: Тематизація та Інтерфейс (Theming)"
    content:
